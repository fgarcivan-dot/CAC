<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Madrid CF | Ultra Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #001B36; /* Azul Oscuro Premium */
            --gold: #FEBE10;    /* Dorado Real Madrid */
            --white: #FFFFFF;
            --bg-dark: #000C1A;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--white); overflow-x: hidden; scroll-behavior: smooth; }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(0, 27, 54, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass);
        }
        .navbar {
            max-width: 1300px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center; padding: 15px 30px;
        }
        .logo img { height: 50px; }
        .nav-links { list-style: none; display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--white); font-weight: 700; font-size: 12px; text-transform: uppercase; }

        /* HERO */
        .hero {
            height: 80vh; display: flex; align-items: center; padding: 0 10%;
            background: linear-gradient(to right, var(--bg-dark), transparent),
                        url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
        }
        .hero-content h1 { font-size: 65px; font-weight: 900; margin: 20px 0; }
        .btn-gold { padding: 15px 35px; background: var(--gold); color: var(--primary); border: none; font-weight: 900; border-radius: 4px; cursor: pointer; }

        /* SECCIÓN DE VÍDEOS */
        .video-section { padding: 80px 5%; background: #000810; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        .section-header h2 { font-size: 32px; font-weight: 900; border-left: 6px solid var(--gold); padding-left: 20px; }

        .video-main {
            width: 100%; max-width: 1100px; margin: 0 auto 50px;
            aspect-ratio: 16/9; border-radius: 20px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); border: 1px solid var(--glass);
        }
        .video-main iframe { width: 100%; height: 100%; border: none; }

        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }
        .video-card {
            position: relative; border-radius: 12px; overflow: hidden; cursor: pointer;
            transition: 0.4s; border: 1px solid var(--glass);
        }
        .video-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .video-card img { width: 100%; height: 180px; object-fit: cover; opacity: 0.8; }
        
        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 180px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); transition: 0.3s;
        }
        .video-card:hover .play-overlay { background: rgba(0, 27, 54, 0.6); }
        .play-btn {
            width: 50px; height: 50px; background: var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: var(--primary); transform: scale(0.8); transition: 0.3s;
        }
        .video-card:hover .play-btn { transform: scale(1.1); }

        .video-info { padding: 15px; background: var(--primary); }
        .video-info h4 { font-size: 14px; line-height: 1.4; }
        .video-info span { font-size: 10px; color: var(--gold); font-weight: 700; }

        /* FOOTER */
        footer { padding: 60px; text-align: center; border-top: 1px solid var(--glass); margin-top: 100px; }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo"><img src="https://publish-p47754-e237306.adobeaemcloud.com/content/dam/common/static/images/logos/logo-real-madrid.svg"></div>
            <ul class="nav-links">
                <li><a href="#">Fútbol</a></li>
                <li><a href="#">RM Play</a></li>
                <li><a href="#">Tienda</a></li>
                <li><a href="#" style="color: var(--gold);">Entradas</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1 id="hero-title">SIEMPRE ADELANTE</h1>
                <button class="btn-gold">VER AHORA</button>
            </div>
        </section>

        <section class="video-section">
            <div class="section-header">
                <h2>RM PLAY | DESTACADOS</h2>
                <p style="color: var(--gold); cursor: pointer;">VER TODO ></p>
            </div>

            <div class="video-main">
                <iframe id="main-player" src="https://www.youtube.com/embed/S_8n07O7S24" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div class="video-grid">
                <div class="video-card" onclick="changeVideo('S_8n07O7S24', 'ENTRENAMIENTO: Preparando el derbi')">
                    <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=500&q=80">
                    <div class="play-overlay"><div class="play-btn">▶</div></div>
                    <div class="video-info">
                        <span>PRIMER EQUIPO</span>
                        <h4>Sesión táctica en Valdebebas</h4>
                    </div>
                </div>

                <div class="video-card" onclick="changeVideo('G9B41M0Lq0w', 'Goles históricos en el Bernabéu')">
                    <img src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=500&q=80">
                    <div class="play-overlay"><div class="play-btn">▶</div></div>
                    <div class="video-info">
                        <span>HISTORIA</span>
                        <h4>Los mejores goles de la temporada</h4>
                    </div>
                </div>

                <div class="video-card" onclick="changeVideo('u0p_Wf1vL9g', 'Rueda de prensa post-partido')">
                    <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=500&q=80">
                    <div class="play-overlay"><div class="play-btn">▶</div></div>
                    <div class="video-info">
                        <span>DIRECTO</span>
                        <h4>Declaraciones de los protagonistas</h4>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <img src="https://publish-p47754-e237306.adobeaemcloud.com/content/dam/common/static/images/logos/logo-real-madrid.svg" height="40">
        <p style="margin-top: 20px; opacity: 0.5; font-size: 12px;">© 2026 REAL MADRID C.F. - TODOS LOS DERECHOS RESERVADOS</p>
    </footer>

    <script>
        // Función para cambiar el vídeo del reproductor principal
        function changeVideo(id, title) {
            const player = document.getElementById('main-player');
            player.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('hero-title').innerText = title;
            
            // Scroll suave hacia arriba para ver el vídeo
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }
    </script>
</body>
</html>
